<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📂 文件哈希校验 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .tool-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .tool-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .tool-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .tool-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .upload-area {
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #f8fafc;
        }
        .upload-area:hover {
            border-color: #f5576c;
            background: #fef2f2;
        }
        .upload-area.dragover {
            border-color: #f5576c;
            background: #fef2f2;
            transform: scale(1.01);
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-text {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .upload-hint {
            color: #94a3b8;
            font-size: 12px;
        }
        .upload-area input[type="file"] {
            display: none;
        }

        .file-info {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }
        .file-info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 14px;
        }
        .file-info-label {
            color: #64748b;
        }
        .file-info-value {
            color: #1a1a2e;
            font-weight: 500;
            word-break: break-all;
            text-align: right;
            margin-left: 16px;
        }

        .btn-calc {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-bottom: 20px;
        }
        .btn-calc:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-calc:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }
        .result-section h4 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
        }
        .hash-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
        }
        .hash-label {
            font-size: 12px;
            color: #f5576c;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .hash-value {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #1a1a2e;
            word-break: break-all;
            line-height: 1.6;
            padding-right: 70px;
        }
        .hash-placeholder {
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
            padding: 12px 0;
        }
        .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 6px 14px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-copy:hover {
            border-color: #f5576c;
            color: #f5576c;
        }

        .loading-text {
            color: #f5576c;
            font-size: 14px;
            text-align: center;
            padding: 16px 0;
        }

        .error-text {
            color: #ef4444;
            font-size: 14px;
            text-align: center;
            padding: 16px 0;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">📂</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">文件哈希校验</span>
            </div>
        </div>
    </header>

    <main class="tool-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="tool-box">
            <h2>📂 文件哈希校验</h2>
            <p class="desc">上传文件，计算 MD5、SHA-1、SHA-256 哈希值</p>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击选择文件 或 拖拽文件到此处</div>
                <div class="upload-hint">支持任意类型文件</div>
                <input type="file" id="fileInput" />
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-info-item">
                    <span class="file-info-label">文件名</span>
                    <span class="file-info-value" id="fileName">-</span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">文件大小</span>
                    <span class="file-info-value" id="fileSize">-</span>
                </div>
            </div>

            <button class="btn-calc" id="btnCalc" disabled>🔐 计算哈希</button>

            <div class="result-section">
                <h4>📋 校验结果</h4>
                <div id="resultContainer">
                    <div class="hash-placeholder" id="resultPlaceholder">等待计算...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const btnCalc = document.getElementById('btnCalc');
        const resultContainer = document.getElementById('resultContainer');
        const resultPlaceholder = document.getElementById('resultPlaceholder');

        let currentFileBase64 = null;
        let currentFileName = null;

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function handleFile(file) {
            if (!file) {
                alert('请选择有效的文件');
                return;
            }

            currentFileName = file.name;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(e) {
                currentFileBase64 = e.target.result;
                btnCalc.disabled = false;
                resultPlaceholder.textContent = '等待计算...';
                resultPlaceholder.style.display = 'block';
                resultPlaceholder.className = 'hash-placeholder';
                resultContainer.innerHTML = '';
                resultContainer.appendChild(resultPlaceholder);
            };
            reader.readAsDataURL(file);
        }

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            handleFile(file);
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        async function calcHash() {
            if (!currentFileBase64) {
                return;
            }

            btnCalc.disabled = true;
            resultPlaceholder.textContent = '⏳ 计算中...';
            resultPlaceholder.style.display = 'block';
            resultPlaceholder.className = 'loading-text';
            resultContainer.innerHTML = '';
            resultContainer.appendChild(resultPlaceholder);

            try {
                const result = await apiRequest('/api/security/file-hash', {
                    method: 'POST',
                    data: {
                        fileBase64: currentFileBase64,
                        fileName: currentFileName
                    }
                });

                if (result.success) {
                    const { md5, sha1, sha256 } = result.data;
                    resultContainer.innerHTML = '';

                    const hashItems = [
                        { label: 'MD5', value: md5 },
                        { label: 'SHA-1', value: sha1 },
                        { label: 'SHA-256', value: sha256 }
                    ];

                    hashItems.forEach((item, index) => {
                        const hashDiv = document.createElement('div');
                        hashDiv.className = 'hash-item';
                        hashDiv.innerHTML = `
                            <div class="hash-label">${item.label}</div>
                            <div class="hash-value" id="hash-value-${index}">${item.value}</div>
                            <button class="btn-copy" id="btn-copy-${index}">📋 复制</button>
                        `;
                        resultContainer.appendChild(hashDiv);

                        document.getElementById(`btn-copy-${index}`).addEventListener('click', () => {
                            copyText(item.value, document.getElementById(`btn-copy-${index}`));
                        });
                    });
                } else {
                    resultPlaceholder.textContent = `❌ ${result.error}`;
                    resultPlaceholder.className = 'error-text';
                    resultPlaceholder.style.display = 'block';
                    resultContainer.innerHTML = '';
                    resultContainer.appendChild(resultPlaceholder);
                }
            } catch (err) {
                console.error('请求后端失败:', err);
                resultPlaceholder.textContent = '❌ 无法连接到后端服务';
                resultPlaceholder.className = 'error-text';
                resultPlaceholder.style.display = 'block';
                resultContainer.innerHTML = '';
                resultContainer.appendChild(resultPlaceholder);
            } finally {
                btnCalc.disabled = false;
            }
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        btnCalc.addEventListener('click', calcHash);

        console.log('📂 文件哈希校验工具已加载！');
    </script>
</body>
</html>
