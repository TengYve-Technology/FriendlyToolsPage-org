<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#️⃣ SHA256哈希 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .tool-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .tool-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .tool-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .tool-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }
        .input-group textarea:focus {
            border-color: #f5576c;
        }

        .btn-hash {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 4px;
        }
        .btn-hash:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-hash:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }
        .result-section h4 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
        }
        .result-box {
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            position: relative;
        }
        .result-text {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #1a1a2e;
            word-break: break-all;
            line-height: 1.6;
            user-select: all;
        }
        .result-text.placeholder {
            color: #94a3b8;
            font-style: normal;
        }
        .btn-copy {
            margin-top: 12px;
            padding: 8px 20px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-copy:hover {
            border-color: #f5576c;
            color: #f5576c;
        }
        .btn-copy.copied {
            background: #d1fae5;
            border-color: #10b981;
            color: #059669;
        }

        .result-meta {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 12px;
            color: #94a3b8;
        }
        .result-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .loading-text {
            color: #f5576c;
            font-size: 13px;
            text-align: center;
            padding: 16px 0;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">#️⃣</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">SHA256哈希</span>
            </div>
        </div>
    </header>

    <main class="tool-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="tool-box">
            <h2>#️⃣ SHA256 哈希计算</h2>
            <p class="desc">将文本转换为 SHA-256 哈希值，不可逆加密</p>

            <div class="input-group">
                <label for="textInput">输入文本</label>
                <textarea id="textInput" placeholder="请输入要计算哈希的文本..."></textarea>
            </div>

            <button class="btn-hash" id="btnHash">🔒 计算哈希</button>

            <div class="result-section">
                <h4>📤 哈希结果</h4>
                <div class="result-box">
                    <div class="result-text placeholder" id="resultText">等待计算...</div>
                </div>
                <div class="result-meta" id="resultMeta" style="display: none;">
                    <span id="metaAlgorithm"></span>
                    <span id="metaLength"></span>
                </div>
                <button class="btn-copy" id="btnCopy" style="display: none;">📋 复制结果</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
        const btnHash = document.getElementById('btnHash');
        const resultText = document.getElementById('resultText');
        const resultMeta = document.getElementById('resultMeta');
        const metaAlgorithm = document.getElementById('metaAlgorithm');
        const metaLength = document.getElementById('metaLength');
        const btnCopy = document.getElementById('btnCopy');

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        async function calculateHash() {
            const text = textInput.value;

            if (!text) {
                resultText.textContent = '请输入文本';
                resultText.classList.add('placeholder');
                resultMeta.style.display = 'none';
                btnCopy.style.display = 'none';
                return;
            }

            btnHash.disabled = true;
            resultText.textContent = '⏳ 计算中...';
            resultText.classList.add('placeholder');
            resultMeta.style.display = 'none';
            btnCopy.style.display = 'none';

            try {
                const result = await apiRequest('/api/security/sha256', {
                    method: 'POST',
                    data: { text }
                });

                if (result.success) {
                    const { result: hash, algorithm, original } = result.data;
                    resultText.textContent = hash;
                    resultText.classList.remove('placeholder');
                    metaAlgorithm.textContent = `算法: ${algorithm}`;
                    metaLength.textContent = `长度: ${hash.length} 字符`;
                    resultMeta.style.display = 'flex';
                    btnCopy.style.display = 'inline-block';
                    btnCopy.dataset.hash = hash;
                } else {
                    resultText.textContent = `❌ ${result.error}`;
                    resultText.classList.add('placeholder');
                }
            } catch (err) {
                console.error('请求后端失败:', err);
                resultText.textContent = '❌ 无法连接到后端服务';
                resultText.classList.add('placeholder');
            } finally {
                btnHash.disabled = false;
            }
        }

        btnHash.addEventListener('click', calculateHash);

        btnCopy.addEventListener('click', () => {
            if (btnCopy.dataset.hash) {
                copyToClipboard(btnCopy.dataset.hash, btnCopy);
            }
        });

        textInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                calculateHash();
            }
        });

        console.log('#️⃣ SHA256哈希工具已加载！');
    </script>
</body>
</html>
