<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📝 文本对比 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .diff-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .diff-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .diff-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .diff-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .mode-toggle-inner {
            display: inline-flex;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 4px;
        }
        .mode-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #64748b;
            white-space: nowrap;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.3);
        }

        .diff-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            min-height: 240px;
            line-height: 1.5;
        }
        .input-group textarea:focus {
            border-color: #f5576c;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            justify-content: center;
        }
        .btn-primary {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            padding: 12px 24px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }

        .result-section {
            margin-top: 24px;
        }
        .result-section h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .stats-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .stat-item.added {
            background: #dcfce7;
            color: #166534;
        }
        .stat-item.removed {
            background: #fee2e2;
            color: #991b1b;
        }
        .stat-item.info {
            background: #e0e7ff;
            color: #3730a3;
        }

        .diff-result {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            min-height: 200px;
            max-height: 500px;
            border: 2px dashed #e2e8f0;
            color: #1a1a2e;
            word-break: break-all;
            white-space: pre-wrap;
            overflow-y: auto;
            line-height: 1.6;
        }
        .diff-result .placeholder {
            color: #94a3b8;
            font-size: 14px;
        }
        .diff-result.error {
            border-color: #fecaca;
            background: #fef2f2;
        }

        .diff-added {
            background: #dcfce7;
            color: #166534;
            padding: 0 2px;
            border-radius: 2px;
        }
        .diff-removed {
            background: #fee2e2;
            color: #991b1b;
            text-decoration: line-through;
            padding: 0 2px;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .diff-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">📝</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">文本对比</span>
            </div>
        </div>
    </header>

    <main class="diff-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="text.html" class="back-link">← 返回文本工具</a>

        <div class="diff-box">
            <h2>📝 文本对比</h2>
            <p class="desc">差异对比 · 高亮显示新增和删除内容</p>

            <div class="mode-toggle">
                <div class="mode-toggle-inner">
                    <button class="mode-btn active" data-mode="lines" id="btnLinesMode">按行对比</button>
                    <button class="mode-btn" data-mode="chars" id="btnCharsMode">按字符对比</button>
                </div>
            </div>

            <div class="diff-row">
                <div class="input-group">
                    <label>
                        <span>原始文本</span>
                        <button class="btn-secondary" id="btnClearOriginal" style="padding: 4px 12px; font-size: 12px;">🗑️ 清空</button>
                    </label>
                    <textarea id="originalText" placeholder="请输入原始文本..."></textarea>
                </div>

                <div class="input-group">
                    <label>
                        <span>修改后文本</span>
                        <button class="btn-secondary" id="btnClearModified" style="padding: 4px 12px; font-size: 12px;">🗑️ 清空</button>
                    </label>
                    <textarea id="modifiedText" placeholder="请输入修改后的文本..."></textarea>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-primary" id="btnDiff">🔍 开始对比</button>
                <button class="btn-secondary" id="btnSample">📝 加载示例</button>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h3>
                    <span>对比结果</span>
                    <div class="stats-bar">
                        <span class="stat-item added" id="statAdded">➕ 新增 0</span>
                        <span class="stat-item removed" id="statRemoved">➖ 删除 0</span>
                        <span class="stat-item info" id="statMode">📊 按行对比</span>
                    </div>
                </h3>
                <div class="diff-result" id="diffResult">
                    <span class="placeholder">等待对比...</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const originalText = document.getElementById('originalText');
        const modifiedText = document.getElementById('modifiedText');
        const btnDiff = document.getElementById('btnDiff');
        const btnSample = document.getElementById('btnSample');
        const btnClearOriginal = document.getElementById('btnClearOriginal');
        const btnClearModified = document.getElementById('btnClearModified');
        const btnLinesMode = document.getElementById('btnLinesMode');
        const btnCharsMode = document.getElementById('btnCharsMode');
        const diffResult = document.getElementById('diffResult');
        const resultSection = document.getElementById('resultSection');
        const statAdded = document.getElementById('statAdded');
        const statRemoved = document.getElementById('statRemoved');
        const statMode = document.getElementById('statMode');

        let currentMode = 'lines';
        let currentResult = null;

        const sampleOriginal = `Hello World!
这是第一行文本。
这是第二行，保持不变。
这是第三行，会被修改。
这是第四行，会被删除。
这是第五行，保持不变。`;

        const sampleModified = `Hello World!
这是第一行文本，已经更新。
这是第二行，保持不变。
这是第三行，已经被修改过了。
这是第五行，保持不变。
这是新增的第六行。`;

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'lines') {
                btnLinesMode.classList.add('active');
                btnCharsMode.classList.remove('active');
                statMode.textContent = '📊 按行对比';
            } else {
                btnCharsMode.classList.add('active');
                btnLinesMode.classList.remove('active');
                statMode.textContent = '📊 按字符对比';
            }
            if (currentResult) {
                doDiff();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderDiffs(diffs) {
            let html = '';
            diffs.forEach(part => {
                const escapedValue = escapeHtml(part.value);
                if (part.added) {
                    html += `<span class="diff-added">${escapedValue}</span>`;
                } else if (part.removed) {
                    html += `<span class="diff-removed">${escapedValue}</span>`;
                } else {
                    html += escapedValue;
                }
            });
            return html;
        }

        async function doDiff() {
            const orig = originalText.value;
            const mod = modifiedText.value;

            if (!orig && !mod) {
                diffResult.innerHTML = '<span class="placeholder">请输入要对比的文本</span>';
                diffResult.classList.remove('error');
                resultSection.style.display = 'block';
                statAdded.textContent = '➕ 新增 0';
                statRemoved.textContent = '➖ 删除 0';
                return;
            }

            btnDiff.disabled = true;
            diffResult.classList.remove('error');
            diffResult.innerHTML = '<span style="color: #f5576c;">⏳ 处理中...</span>';
            resultSection.style.display = 'block';

            try {
                const result = await apiRequest('/api/text/diff', {
                    method: 'POST',
                    data: {
                        originalText: orig,
                        modifiedText: mod
                    },
                    options: { mode: currentMode }
                });

                if (result.success) {
                    currentResult = result.data;
                    diffResult.innerHTML = renderDiffs(result.data.diffs);
                    const unit = currentMode === 'lines' ? '行' : '字符';
                    statAdded.textContent = `➕ 新增 ${result.data.addedCount} ${unit}`;
                    statRemoved.textContent = `➖ 删除 ${result.data.removedCount} ${unit}`;
                } else {
                    diffResult.innerHTML = `<span style="color:#ef4444;">❌ ${result.error}</span>`;
                    diffResult.classList.add('error');
                    currentResult = null;
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                diffResult.innerHTML = '<span style="color:#ef4444;">❌ 无法连接到后端服务</span>';
                diffResult.classList.add('error');
                currentResult = null;
            } finally {
                btnDiff.disabled = false;
            }
        }

        function loadSample() {
            originalText.value = sampleOriginal;
            modifiedText.value = sampleModified;
            doDiff();
        }

        function clearOriginal() {
            originalText.value = '';
            originalText.focus();
        }

        function clearModified() {
            modifiedText.value = '';
            modifiedText.focus();
        }

        btnDiff.addEventListener('click', doDiff);
        btnSample.addEventListener('click', loadSample);
        btnClearOriginal.addEventListener('click', clearOriginal);
        btnClearModified.addEventListener('click', clearModified);

        btnLinesMode.addEventListener('click', () => {
            setMode('lines');
        });
        btnCharsMode.addEventListener('click', () => {
            setMode('chars');
        });

        loadSample();

        console.log('📝 文本对比工具已加载！');
    </script>
</body>
</html>
