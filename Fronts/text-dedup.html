<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 文本去重 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .convert-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .convert-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .convert-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .convert-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input-group textarea,
        .input-group select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
        }
        .input-group textarea:focus,
        .input-group select:focus {
            border-color: #f5576c;
        }
        .input-group textarea {
            min-height: 180px;
        }

        .convert-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .result-box {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 180px;
            border: 2px dashed #e2e8f0;
            color: #1a1a2e;
            word-break: break-all;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        .result-box .placeholder {
            color: #94a3b8;
            font-size: 14px;
        }

        .btn-convert {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            width: 100%;
        }
        .btn-convert:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-convert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-copy {
            padding: 6px 14px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .btn-copy:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }
        .btn-copy.copied {
            background: #10b981;
            color: #fff;
        }

        .options-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .options-row .input-group {
            flex: 1;
            margin-bottom: 0;
            min-width: 160px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: 0.3s;
            height: 100%;
        }
        .checkbox-group:hover {
            border-color: #f5576c;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #f5576c;
        }
        .checkbox-group label {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a2e;
            cursor: pointer;
            margin: 0;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
            display: none;
        }
        .stat-item {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-item .stat-num {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            font-family: 'Courier New', monospace;
        }
        .stat-item .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }
        .stat-item.removed .stat-num {
            color: #ef4444;
        }
        .stat-item.result .stat-num {
            color: #10b981;
        }

        @media (max-width: 640px) {
            .convert-row {
                grid-template-columns: 1fr;
            }
            .options-row {
                flex-direction: column;
            }
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🔍</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">文本去重</span>
            </div>
        </div>
    </header>

    <main class="convert-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="convert.html" class="back-link">← 返回转换工具</a>

        <div class="convert-box">
            <h2>🔍 文本去重</h2>
            <p class="desc">去除重复行，支持多种分隔符和大小写忽略</p>

            <div class="options-row">
                <div class="input-group">
                    <label for="separator">分隔符</label>
                    <select id="separator">
                        <option value="\n">换行符</option>
                        <option value=",">逗号 (,)</option>
                        <option value=" ">空格</option>
                        <option value=";">分号 (;)</option>
                        <option value="|">竖线 (|)</option>
                        <option value="\t">制表符 (Tab)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>&nbsp;</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="ignoreCase" />
                        <label for="ignoreCase">忽略大小写</label>
                    </div>
                </div>
            </div>

            <div class="convert-row">
                <div class="input-group">
                    <label>
                        <span>输入文本</span>
                    </label>
                    <textarea id="inputText" placeholder="请输入要去重的文本..."></textarea>
                </div>
                <div class="input-group">
                    <label>
                        <span>去重结果</span>
                        <button class="btn-copy" id="btnCopy" style="display: none;">📋 复制</button>
                    </label>
                    <div class="result-box" id="outputText">
                        <span class="placeholder">等待去重...</span>
                    </div>
                </div>
            </div>

            <button class="btn-convert" id="btnDedup">🔍 开始去重</button>

            <div class="stats-row" id="statsRow">
                <div class="stat-item">
                    <div class="stat-num" id="originalCount">0</div>
                    <div class="stat-label">原始数量</div>
                </div>
                <div class="stat-item result">
                    <div class="stat-num" id="resultCount">0</div>
                    <div class="stat-label">去重后</div>
                </div>
                <div class="stat-item removed">
                    <div class="stat-num" id="removedCount">0</div>
                    <div class="stat-label">已移除</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const separator = document.getElementById('separator');
        const ignoreCase = document.getElementById('ignoreCase');
        const btnDedup = document.getElementById('btnDedup');
        const btnCopy = document.getElementById('btnCopy');
        const statsRow = document.getElementById('statsRow');
        const originalCount = document.getElementById('originalCount');
        const resultCount = document.getElementById('resultCount');
        const removedCount = document.getElementById('removedCount');

        let currentResult = '';

        function parseSeparator(str) {
            const mappings = {
                '\\n': '\n',
                '\\t': '\t',
                '\\r': '\r'
            };
            return mappings[str] || str;
        }

        async function dedup() {
            const text = inputText.value;
            const sep = parseSeparator(separator.value);
            const ignore = ignoreCase.checked;

            if (!text.trim()) {
                outputText.innerHTML = '<span class="placeholder">请输入文本</span>';
                btnCopy.style.display = 'none';
                statsRow.style.display = 'none';
                return;
            }

            btnDedup.disabled = true;
            outputText.innerHTML = '<span style="color: #f5576c;">⏳ 处理中...</span>';

            try {
                const result = await apiRequest('/api/convert/text-dedup', {
                    method: 'POST',
                    data: { text },
                    options: { separator: sep, ignoreCase: ignore }
                });

                if (result.success) {
                    currentResult = result.data.result;
                    outputText.textContent = currentResult;
                    btnCopy.style.display = 'inline-block';
                    statsRow.style.display = 'grid';
                    originalCount.textContent = result.data.originalCount;
                    resultCount.textContent = result.data.resultCount;
                    removedCount.textContent = result.data.removedCount;
                } else {
                    outputText.innerHTML = `<span style="color:#ef4444;">❌ ${result.error}</span>`;
                    btnCopy.style.display = 'none';
                    statsRow.style.display = 'none';
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                outputText.innerHTML = '<span style="color:#ef4444;">❌ 无法连接到后端服务</span>';
                btnCopy.style.display = 'none';
                statsRow.style.display = 'none';
            } finally {
                btnDedup.disabled = false;
            }
        }

        async function copyResult() {
            if (!currentResult) return;
            try {
                await navigator.clipboard.writeText(currentResult);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = currentResult;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            }
        }

        btnDedup.addEventListener('click', dedup);
        btnCopy.addEventListener('click', copyResult);

        inputText.value = 'apple\nbanana\nApple\norange\nbanana\ngrape\napple';
        dedup();

        console.log('🔍 文本去重已加载！');
    </script>
</body>
</html>
