<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔐 密码强度检测 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .tool-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .tool-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .tool-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .tool-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .input-group input {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .input-group input:focus {
            border-color: #f5576c;
        }

        .strength-section {
            margin-bottom: 24px;
        }
        .strength-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .strength-label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .strength-score {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }
        .strength-bar {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.4s ease, background 0.4s ease;
            width: 0%;
            background: #ef4444;
        }
        .strength-level {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .level-weak { background: #fee2e2; color: #dc2626; }
        .level-medium { background: #fef3c7; color: #d97706; }
        .level-strong { background: #d1fae5; color: #059669; }
        .level-very_strong { background: #dbeafe; color: #2563eb; }

        .checks-section, .suggestions-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }
        .checks-section h4, .suggestions-section h4 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
        }
        .check-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
        }
        .check-icon {
            font-size: 16px;
        }
        .check-pass { color: #059669; }
        .check-fail { color: #94a3b8; }

        .suggestions-list {
            list-style: none;
        }
        .suggestions-list li {
            padding: 8px 0;
            font-size: 13px;
            color: #64748b;
            border-bottom: 1px solid #f8fafc;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .suggestions-list li:last-child {
            border-bottom: none;
        }
        .suggestion-icon {
            color: #f59e0b;
            flex-shrink: 0;
        }

        .placeholder-text {
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            padding: 16px 0;
        }

        @media (max-width: 640px) {
            .check-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🔐</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">密码强度检测</span>
            </div>
        </div>
    </header>

    <main class="tool-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="tool-box">
            <h2>🔐 密码强度检测</h2>
            <p class="desc">实时评估密码安全性，获取改进建议</p>

            <div class="input-group">
                <label for="passwordInput">输入密码</label>
                <input type="text" id="passwordInput" placeholder="请输入要检测的密码..." />
            </div>

            <div class="strength-section" id="strengthSection" style="display: none;">
                <div class="strength-header">
                    <span class="strength-label">强度评分</span>
                    <span class="strength-score" id="strengthScore">0</span>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-level" id="strengthLevel"></span>
            </div>

            <div class="checks-section" id="checksSection" style="display: none;">
                <h4>✅ 检查项</h4>
                <div class="check-list" id="checkList"></div>
            </div>

            <div class="suggestions-section" id="suggestionsSection" style="display: none;">
                <h4>💡 改进建议</h4>
                <ul class="suggestions-list" id="suggestionsList"></ul>
            </div>

            <div id="placeholderBox">
                <p class="placeholder-text">输入密码后将实时显示强度分析</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const passwordInput = document.getElementById('passwordInput');
        const strengthSection = document.getElementById('strengthSection');
        const checksSection = document.getElementById('checksSection');
        const suggestionsSection = document.getElementById('suggestionsSection');
        const placeholderBox = document.getElementById('placeholderBox');
        const strengthScore = document.getElementById('strengthScore');
        const strengthFill = document.getElementById('strengthFill');
        const strengthLevel = document.getElementById('strengthLevel');
        const checkList = document.getElementById('checkList');
        const suggestionsList = document.getElementById('suggestionsList');

        let debounceTimer = null;

        const checkLabels = {
            length: '长度要求 (≥8位)',
            lowercase: '包含小写字母',
            uppercase: '包含大写字母',
            numbers: '包含数字',
            symbols: '包含特殊符号',
            noCommon: '非常见密码'
        };

        function debounce(func, delay) {
            return function(...args) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function updateStrengthDisplay(result) {
            const { score, level, levelText, checks, suggestions } = result;

            strengthScore.textContent = score;
            strengthFill.style.width = score + '%';
            strengthLevel.textContent = levelText;
            strengthLevel.className = 'strength-level level-' + level;

            if (score < 40) {
                strengthFill.style.background = '#ef4444';
            } else if (score < 70) {
                strengthFill.style.background = '#f59e0b';
            } else if (score < 90) {
                strengthFill.style.background = '#10b981';
            } else {
                strengthFill.style.background = '#3b82f6';
            }

            checkList.innerHTML = '';
            for (const [key, passed] of Object.entries(checks)) {
                const label = checkLabels[key] || key;
                const item = document.createElement('div');
                item.className = 'check-item';
                item.innerHTML = `
                    <span class="check-icon ${passed ? 'check-pass' : 'check-fail'}">
                        ${passed ? '✓' : '✗'}
                    </span>
                    <span>${label}</span>
                `;
                checkList.appendChild(item);
            }

            suggestionsList.innerHTML = '';
            if (suggestions && suggestions.length > 0) {
                suggestions.forEach(suggestion => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span class="suggestion-icon">💡</span>
                        <span>${suggestion}</span>
                    `;
                    suggestionsList.appendChild(li);
                });
                suggestionsSection.style.display = 'block';
            } else {
                suggestionsSection.style.display = 'none';
            }

            strengthSection.style.display = 'block';
            checksSection.style.display = 'block';
            placeholderBox.style.display = 'none';
        }

        function showPlaceholder() {
            strengthSection.style.display = 'none';
            checksSection.style.display = 'none';
            suggestionsSection.style.display = 'none';
            placeholderBox.style.display = 'block';
        }

        const checkStrength = debounce(async () => {
            const password = passwordInput.value;

            if (!password) {
                showPlaceholder();
                return;
            }

            try {
                const result = await apiRequest('/api/security/password-strength', {
                    method: 'POST',
                    data: { password }
                });

                if (result.success) {
                    updateStrengthDisplay(result.data);
                } else {
                    console.error('检测失败:', result.error);
                }
            } catch (error) {
                console.error('请求后端失败:', error);
            }
        }, 300);

        passwordInput.addEventListener('input', checkStrength);

        console.log('🔐 密码强度检测已加载！');
    </script>
</body>
</html>
