<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔢 进制转换 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .convert-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .convert-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .convert-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .convert-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .input-group input,
        .input-group select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .input-group input:focus,
        .input-group select:focus {
            border-color: #f5576c;
        }

        .convert-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .result-box {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            min-height: 48px;
            border: 2px dashed #e2e8f0;
            color: #1a1a2e;
            word-break: break-all;
            display: flex;
            align-items: center;
        }
        .result-box .placeholder {
            color: #94a3b8;
            font-size: 14px;
        }

        .btn-convert {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            width: 100%;
        }
        .btn-convert:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }

        .history {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }
        .history h4 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #1a1a2e;
            padding: 4px 0;
            border-bottom: 1px solid #f8fafc;
            font-family: 'Courier New', monospace;
        }
        .history-item .from {
            color: #64748b;
        }

        @media (max-width: 640px) {
            .convert-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🔢</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">进制转换</span>
            </div>
        </div>
    </header>

    <main class="convert-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="convert.html" class="back-link">← 返回转换工具</a>

        <div class="convert-box">
            <h2>🔢 进制转换</h2>
            <p class="desc">在二进制 · 八进制 · 十进制 · 十六进制之间自由转换</p>

            <div class="convert-row">
                <div class="input-group">
                    <label for="inputNumber">输入数字</label>
                    <input type="text" id="inputNumber" placeholder="例如：255 或 FF" />
                </div>
                <div class="input-group">
                    <label for="outputNumber">转换结果</label>
                    <div class="result-box" id="outputNumber">
                        <span class="placeholder">等待转换...</span>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="input-group">
                    <label for="fromBase">从</label>
                    <select id="fromBase">
                        <option value="2">二进制 (2)</option>
                        <option value="8">八进制 (8)</option>
                        <option value="10" selected>十进制 (10)</option>
                        <option value="16">十六进制 (16)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="toBase">到</label>
                    <select id="toBase">
                        <option value="2">二进制 (2)</option>
                        <option value="8">八进制 (8)</option>
                        <option value="10" selected>十进制 (10)</option>
                        <option value="16">十六进制 (16)</option>
                    </select>
                </div>
            </div>

            <button class="btn-convert" id="btnConvert">🔄 立即转换</button>

            <div class="history" id="historyBox" style="display: none;">
                <h4>📋 历史记录</h4>
                <div id="historyList"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const inputNumber = document.getElementById('inputNumber');
        const outputNumber = document.getElementById('outputNumber');
        const fromBase = document.getElementById('fromBase');
        const toBase = document.getElementById('toBase');
        const btnConvert = document.getElementById('btnConvert');
        const historyBox = document.getElementById('historyBox');
        const historyList = document.getElementById('historyList');

        function addHistory(from, to) {
            historyBox.style.display = 'block';
            const item = document.createElement('div');
            item.className = 'history-item';
            const now = new Date();
            const time = now.toLocaleTimeString();
            item.innerHTML = `
                <span class="from">${from}</span>
                <span>→ ${to}</span>
                <span style="color:#94a3b8;font-size:12px;">${time}</span>
            `;
            historyList.prepend(item);
            while (historyList.children.length > 10) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        async function convert() {
            const number = inputNumber.value.trim();
            const from = parseInt(fromBase.value);
            const to = parseInt(toBase.value);

            if (!number) {
                outputNumber.innerHTML = '<span class="placeholder">请输入数字</span>';
                return;
            }

            outputNumber.innerHTML = '<span style="color: #f5576c;">⏳ 转换中...</span>';

            try {
                const result = await apiRequest('/api/convert/base', {
                    method: 'POST',
                    data: { number, fromBase: from, toBase: to }
                });

                if (result.success) {
                    const displayResult = result.data.result;
                    outputNumber.textContent = displayResult;
                    addHistory(
                        `${number} (${from}进制)`,
                        `${displayResult} (${to}进制)`
                    );
                } else {
                    outputNumber.innerHTML = `<span style="color:#ef4444;">❌ ${result.error}</span>`;
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                outputNumber.innerHTML = '<span style="color:#ef4444;">❌ 无法连接到后端服务</span>';
            }
        }

        // ============================================
        // 事件绑定
        // ============================================
        btnConvert.addEventListener('click', convert);
        inputNumber.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') convert();
        });
        fromBase.addEventListener('change', convert);
        toBase.addEventListener('change', convert);

        // ============================================
        // 初始化
        // ============================================
        inputNumber.value = '255';
        convert();

        console.log('🔢 进制转换已加载（调用后端 API）！');
    </script>
</body>
</html>
