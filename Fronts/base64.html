<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📦 Base64 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .convert-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .convert-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .convert-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .convert-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            min-height: 160px;
        }
        .input-group textarea:focus {
            border-color: #f5576c;
        }

        .result-box {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 160px;
            border: 2px dashed #e2e8f0;
            color: #1a1a2e;
            word-break: break-all;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        .result-box .placeholder {
            color: #94a3b8;
            font-size: 14px;
        }

        .btn-convert {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            width: 100%;
        }
        .btn-convert:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-convert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-copy {
            padding: 6px 14px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .btn-copy:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }
        .btn-copy.copied {
            background: #10b981;
            color: #fff;
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .mode-toggle-inner {
            display: inline-flex;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 4px;
        }
        .mode-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #64748b;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.3);
        }

        .info-box {
            background: #f0f9ff;
            border: 1px solid #e0f2fe;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #0369a1;
        }

        @media (max-width: 640px) {
            .convert-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">Base64</span>
            </div>
        </div>
    </header>

    <main class="convert-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="convert.html" class="back-link">← 返回转换工具</a>

        <div class="convert-box">
            <h2>📦 Base64 编码/解码</h2>
            <p class="desc">对文本进行 Base64 编码和解码</p>

            <div class="info-box">
                💡 提示：Base64 常用于将二进制数据转换为文本格式，便于在 JSON、HTML 等文本协议中传输。
            </div>

            <div class="mode-toggle">
                <div class="mode-toggle-inner">
                    <button class="mode-btn active" data-mode="encode" id="btnEncode">编码</button>
                    <button class="mode-btn" data-mode="decode" id="btnDecode">解码</button>
                </div>
            </div>

            <div class="input-group">
                <label>
                    <span id="inputLabel">输入内容</span>
                </label>
                <textarea id="inputText" placeholder="请输入需要处理的内容..."></textarea>
            </div>

            <div class="input-group">
                <label>
                    <span id="outputLabel">转换结果</span>
                    <button class="btn-copy" id="btnCopy" style="display: none;">📋 复制</button>
                </label>
                <div class="result-box" id="outputText">
                    <span class="placeholder">等待转换...</span>
                </div>
            </div>

            <button class="btn-convert" id="btnConvert">🔄 立即转换</button>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const btnConvert = document.getElementById('btnConvert');
        const btnCopy = document.getElementById('btnCopy');
        const btnEncode = document.getElementById('btnEncode');
        const btnDecode = document.getElementById('btnDecode');
        const inputLabel = document.getElementById('inputLabel');

        let currentMode = 'encode';
        let currentResult = '';

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'encode') {
                btnEncode.classList.add('active');
                btnDecode.classList.remove('active');
                inputLabel.textContent = '输入内容';
                inputText.placeholder = '请输入需要 Base64 编码的文本...';
            } else {
                btnDecode.classList.add('active');
                btnEncode.classList.remove('active');
                inputLabel.textContent = '输入编码字符串';
                inputText.placeholder = '请输入 Base64 编码的字符串...';
            }
            outputText.innerHTML = '<span class="placeholder">等待转换...</span>';
            btnCopy.style.display = 'none';
            currentResult = '';
        }

        async function convert() {
            const text = inputText.value;

            if (!text.trim()) {
                outputText.innerHTML = '<span class="placeholder">请输入内容</span>';
                btnCopy.style.display = 'none';
                return;
            }

            btnConvert.disabled = true;
            outputText.innerHTML = '<span style="color: #f5576c;">⏳ 转换中...</span>';

            try {
                const result = await apiRequest('/api/convert/base64', {
                    method: 'POST',
                    data: { text },
                    options: { mode: currentMode }
                });

                if (result.success) {
                    currentResult = result.data.result;
                    outputText.textContent = currentResult;
                    btnCopy.style.display = 'inline-block';
                } else {
                    outputText.innerHTML = `<span style="color:#ef4444;">❌ ${result.error}</span>`;
                    btnCopy.style.display = 'none';
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                outputText.innerHTML = '<span style="color:#ef4444;">❌ 无法连接到后端服务</span>';
                btnCopy.style.display = 'none';
            } finally {
                btnConvert.disabled = false;
            }
        }

        async function copyResult() {
            if (!currentResult) return;
            try {
                await navigator.clipboard.writeText(currentResult);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = currentResult;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            }
        }

        btnConvert.addEventListener('click', convert);
        btnCopy.addEventListener('click', copyResult);
        btnEncode.addEventListener('click', () => setMode('encode'));
        btnDecode.addEventListener('click', () => setMode('decode'));

        // 示例
        inputText.value = 'Hello 世界! 你好 Base64!';
        convert();

        console.log('📦 Base64 工具已加载！');
    </script>
</body>
</html>
