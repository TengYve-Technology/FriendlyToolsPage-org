<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎲 随机抽取器 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .convert-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .convert-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .convert-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .convert-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .options-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .input-group textarea,
        .input-group input[type="number"] {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }
        .input-group textarea:focus,
        .input-group input[type="number"]:focus {
            border-color: #f5576c;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 160px;
            line-height: 1.6;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .checkbox-group:hover {
            border-color: #f093fb;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #f5576c;
            cursor: pointer;
        }
        .checkbox-group label {
            font-size: 14px;
            color: #1a1a2e;
            cursor: pointer;
            flex: 1;
        }

        .btn-pick {
            padding: 14px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .btn-pick:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-pick:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #f1f5f9;
        }
        .result-section h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .stat-item {
            padding: 8px 16px;
            background: #f0f9ff;
            border-radius: 20px;
            font-size: 13px;
            color: #3b82f6;
        }
        .stat-item strong {
            font-weight: 600;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .result-item {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            padding: 16px 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            word-break: break-word;
        }
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .result-item:nth-child(1) { animation-delay: 0.05s; }
        .result-item:nth-child(2) { animation-delay: 0.1s; }
        .result-item:nth-child(3) { animation-delay: 0.15s; }
        .result-item:nth-child(4) { animation-delay: 0.2s; }
        .result-item:nth-child(5) { animation-delay: 0.25s; }
        .result-item:nth-child(6) { animation-delay: 0.3s; }
        .result-item:nth-child(7) { animation-delay: 0.35s; }
        .result-item:nth-child(8) { animation-delay: 0.4s; }
        .result-item:nth-child(9) { animation-delay: 0.45s; }
        .result-item:nth-child(10) { animation-delay: 0.5s; }

        .empty-result {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px dashed #e2e8f0;
        }
        .empty-result .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .error-text {
            color: #ef4444;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 640px) {
            .options-row {
                grid-template-columns: 1fr;
            }
            .result-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🎲</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">随机抽取</span>
            </div>
        </div>
    </header>

    <main class="convert-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="convert-box">
            <h2>🎲 随机抽取器</h2>
            <p class="desc">输入选项，一键随机抽取 · 支持抽取多个和重复抽取</p>

            <div class="options-row">
                <div class="input-group">
                    <label for="itemsInput">候选项（每行一个）</label>
                    <textarea id="itemsInput" placeholder="选项1&#10;选项2&#10;选项3&#10;..."></textarea>
                </div>
                <div>
                    <div class="input-group">
                        <label for="countInput">抽取数量</label>
                        <input type="number" id="countInput" value="1" min="1" />
                    </div>
                    <div class="input-group">
                        <label>抽取选项</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="allowRepeat" />
                            <label for="allowRepeat">允许重复抽取</label>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-pick" id="btnPick">🎰 开始抽取</button>

            <div class="result-section" id="resultSection">
                <h3>✨ 抽取结果</h3>
                <div class="empty-result" id="emptyResult">
                    <div class="icon">🎯</div>
                    <p>点击"开始抽取"按钮查看结果</p>
                </div>
                <div id="resultContent" style="display: none;">
                    <div class="result-stats" id="resultStats"></div>
                    <div class="result-grid" id="resultGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const itemsInput = document.getElementById('itemsInput');
        const countInput = document.getElementById('countInput');
        const allowRepeat = document.getElementById('allowRepeat');
        const btnPick = document.getElementById('btnPick');
        const emptyResult = document.getElementById('emptyResult');
        const resultContent = document.getElementById('resultContent');
        const resultStats = document.getElementById('resultStats');
        const resultGrid = document.getElementById('resultGrid');

        async function pick() {
            const itemsText = itemsInput.value.trim();
            const items = itemsText.split('\n').map(item => item.trim()).filter(item => item.length > 0);
            const count = parseInt(countInput.value) || 1;
            const allowRepeatValue = allowRepeat.checked;

            if (items.length === 0) {
                showError('请输入至少一个候选项');
                return;
            }

            if (count < 1) {
                showError('抽取数量至少为1');
                return;
            }

            if (!allowRepeatValue && count > items.length) {
                showError(`不允许重复时，抽取数量不能超过选项数量（${items.length}个）`);
                return;
            }

            btnPick.disabled = true;
            btnPick.textContent = '⏳ 抽取中...';

            try {
                const result = await apiRequest('/api/fun/random-picker', {
                    method: 'POST',
                    data: { items: items },
                    options: { count: count, allowRepeat: allowRepeatValue }
                });

                if (result.success) {
                    showResult(result.data);
                } else {
                    showError(result.error || '抽取失败');
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                showError('无法连接到后端服务');
            } finally {
                btnPick.disabled = false;
                btnPick.textContent = '🎰 开始抽取';
            }
        }

        function showResult(data) {
            emptyResult.style.display = 'none';
            resultContent.style.display = 'block';

            resultStats.innerHTML = `
                <div class="stat-item">共 <strong>${data.total}</strong> 个选项</div>
                <div class="stat-item">抽取 <strong>${data.count}</strong> 个</div>
                <div class="stat-item">${data.allowRepeat ? '🔄 允许重复' : '🚫 不重复'}</div>
            `;

            resultGrid.innerHTML = '';
            data.result.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.textContent = item;
                resultGrid.appendChild(div);
            });
        }

        function showError(message) {
            emptyResult.style.display = 'none';
            resultContent.style.display = 'block';
            resultStats.innerHTML = '';
            resultGrid.innerHTML = `<div class="error-text">❌ ${message}</div>`;
        }

        btnPick.addEventListener('click', pick);

        itemsInput.value = '苹果\n香蕉\n橙子\n葡萄\n西瓜\n草莓\n芒果\n樱桃';

        console.log('🎲 随机抽取器已加载！');
    </script>
</body>
</html>
