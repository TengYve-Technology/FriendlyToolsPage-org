<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📏 单位转换 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px 30px 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .card h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .card .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .input-group input,
        .input-group select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .input-group input:focus,
        .input-group select:focus {
            border-color: #f5576c;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .result-box {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px 20px;
            border: 2px dashed #e2e8f0;
            margin-top: 8px;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .result-box .value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .result-box .unit {
            font-size: 16px;
            color: #64748b;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .category-tabs button {
            padding: 8px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            background: #fff;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .category-tabs button:hover {
            border-color: #f5576c;
            color: #f5576c;
        }
        .category-tabs button.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border-color: transparent;
        }

        .swap-btn {
            display: flex;
            justify-content: center;
            margin: 4px 0 12px;
        }
        .swap-btn button {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 6px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            color: #64748b;
        }
        .swap-btn button:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }

        .status-msg {
            margin-top: 12px;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            background: #f8fafc;
            color: #64748b;
        }
        .status-msg.error {
            background: #fef2f2;
            color: #ef4444;
        }
        .status-msg.success {
            background: #f0fdf4;
            color: #22c55e;
        }

        @media (max-width: 640px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">📏</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">单位转换</span>
            </div>
        </div>
    </header>

    <main class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="convert.html" class="back-link">← 返回转换工具</a>

        <div class="card">
            <h2>📏 单位转换</h2>
            <p class="desc" id="categoryDesc">长度 · 重量 · 温度 · 面积 · 速度 · 存储</p>

            <!-- 分类选项卡 -->
            <div class="category-tabs" id="categoryTabs">
                <!-- 由 JS 动态生成 -->
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="fromUnit">从</label>
                    <select id="fromUnit"></select>
                </div>
                <div class="input-group">
                    <label for="toUnit">到</label>
                    <select id="toUnit"></select>
                </div>
            </div>

            <div class="input-group">
                <label for="inputValue">数值</label>
                <input type="number" id="inputValue" value="1" step="any" min="0" />
            </div>

            <div class="swap-btn">
                <button id="swapBtn">⇄ 交换单位</button>
            </div>

            <div class="result-box">
                <span class="value" id="resultValue">—</span>
                <span class="unit" id="resultUnit"></span>
            </div>

            <div class="status-msg" id="statusMsg">📌 输入数值，自动转换</div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 数据由后端 API 处理</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        // ============================================
        // 单位数据（前端只存显示名称，后端存换算因子）
        // ============================================
        const categoryData = {
            length: {
                name: '长度',
                icon: '📐',
                units: ['mm', 'cm', 'm', 'km', 'inch', 'ft', 'yd', 'mile']
            },
            weight: {
                name: '重量',
                icon: '⚖️',
                units: ['mg', 'g', 'kg', 't', 'oz', 'lb', 'jin', 'liang']
            },
            temperature: {
                name: '温度',
                icon: '🌡️',
                units: ['celsius', 'fahrenheit', 'kelvin']
            },
            area: {
                name: '面积',
                icon: '📐',
                units: ['mm2', 'cm2', 'm2', 'km2', 'ha', 'acre', 'sqft']
            },
            speed: {
                name: '速度',
                icon: '🚀',
                units: ['mps', 'kmh', 'mph', 'knot', 'fps']
            },
            storage: {
                name: '存储',
                icon: '💾',
                units: ['b', 'kb', 'mb', 'gb', 'tb']
            }
        };

        const categoryKeys = ['length', 'weight', 'temperature', 'area', 'speed', 'storage'];
        let currentCategory = 'length';

        // ============================================
        // DOM 引用
        // ============================================
        const categoryTabs = document.getElementById('categoryTabs');
        const categoryDesc = document.getElementById('categoryDesc');
        const fromUnit = document.getElementById('fromUnit');
        const toUnit = document.getElementById('toUnit');
        const inputValue = document.getElementById('inputValue');
        const resultValue = document.getElementById('resultValue');
        const resultUnit = document.getElementById('resultUnit');
        const swapBtn = document.getElementById('swapBtn');
        const statusMsg = document.getElementById('statusMsg');

        // ============================================
        // 核心：调用后端 API 进行转换
        // ============================================
        async function convert() {
            const value = parseFloat(inputValue.value);
            if (isNaN(value) || value < 0) {
                resultValue.textContent = '—';
                resultUnit.textContent = '';
                return;
            }

            const category = currentCategory;
            const from = fromUnit.value;
            const to = toUnit.value;

            if (!from || !to) return;

            // 显示加载状态
            resultValue.textContent = '...';
            resultUnit.textContent = '计算中';
            statusMsg.textContent = '⏳ 正在转换...';
            statusMsg.className = 'status-msg';

            try {
                const data = await apiRequest('/api/convert/unit', {
                    method: 'POST',
                    data: {
                        category: category,
                        from: from,
                        to: to,
                        value: value
                    }
                });

                if (data.success) {
                    resultValue.textContent = data.data.result.toFixed(6);
                    resultUnit.textContent = data.data.toUnitName;
                    statusMsg.textContent = `✅ 1 ${data.data.fromUnitName} = ${data.data.rate} ${data.data.toUnitName}`;
                    statusMsg.className = 'status-msg success';
                } else {
                    resultValue.textContent = '❌';
                    resultUnit.textContent = '错误';
                    statusMsg.textContent = `❌ ${data.error}`;
                    statusMsg.className = 'status-msg error';
                }
            } catch (error) {
                console.error('请求失败:', error);
                resultValue.textContent = '❌';
                resultUnit.textContent = '网络错误';
                statusMsg.textContent = '❌ 无法连接后端服务，请检查服务器是否运行';
                statusMsg.className = 'status-msg error';
            }
        }

        // ============================================
        // 渲染单位下拉菜单
        // ============================================
        function renderUnits() {
            const category = categoryData[currentCategory];
            const unitKeys = category.units;

            fromUnit.innerHTML = '';
            toUnit.innerHTML = '';

            unitKeys.forEach((key) => {
                const opt1 = document.createElement('option');
                opt1.value = key;
                opt1.textContent = key;
                fromUnit.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = key;
                opt2.textContent = key;
                toUnit.appendChild(opt2);
            });

            if (unitKeys.length >= 2) {
                fromUnit.value = unitKeys[0];
                toUnit.value = unitKeys[1];
            } else if (unitKeys.length === 1) {
                fromUnit.value = unitKeys[0];
                toUnit.value = unitKeys[0];
            }

            // 延迟执行，确保 DOM 更新
            setTimeout(convert, 50);
        }

        // ============================================
        // 渲染分类选项卡
        // ============================================
        function renderCategories() {
            categoryTabs.innerHTML = '';
            categoryKeys.forEach((key) => {
                const btn = document.createElement('button');
                btn.textContent = `${categoryData[key].icon} ${categoryData[key].name}`;
                btn.dataset.category = key;
                if (key === currentCategory) btn.classList.add('active');
                btn.addEventListener('click', () => {
                    currentCategory = key;
                    document.querySelectorAll('.category-tabs button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    categoryDesc.textContent = `${categoryData[key].icon} ${categoryData[key].name} · 输入数值，自动转换`;
                    renderUnits();
                });
                categoryTabs.appendChild(btn);
            });
        }

        // ============================================
        // 交换单位
        // ============================================
        function swapUnits() {
            const fromVal = fromUnit.value;
            const toVal = toUnit.value;
            fromUnit.value = toVal;
            toUnit.value = fromVal;
            convert();
        }

        // ============================================
        // 事件绑定
        // ============================================
        inputValue.addEventListener('input', convert);
        fromUnit.addEventListener('change', convert);
        toUnit.addEventListener('change', convert);
        swapBtn.addEventListener('click', swapUnits);

        // ============================================
        // 初始化
        // ============================================
        renderCategories();
        renderUnits();

        console.log('📏 单位转换已加载（API 驱动）！');
    </script>
</body>
</html>
