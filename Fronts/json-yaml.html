<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔄 JSON YAML 转换 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .convert-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .convert-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .convert-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .convert-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .direction-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .direction-toggle-inner {
            display: inline-flex;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 4px;
        }
        .direction-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #64748b;
            white-space: nowrap;
        }
        .direction-btn.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.3);
        }

        .convert-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: start;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            min-height: 320px;
            line-height: 1.5;
        }
        .input-group textarea:focus {
            border-color: #f5576c;
        }

        .result-box {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            min-height: 320px;
            max-height: 500px;
            border: 2px dashed #e2e8f0;
            color: #1a1a2e;
            word-break: break-all;
            white-space: pre-wrap;
            overflow-y: auto;
            line-height: 1.5;
        }
        .result-box .placeholder {
            color: #94a3b8;
            font-size: 14px;
        }
        .result-box.error {
            border-color: #fecaca;
            background: #fef2f2;
        }

        .middle-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding-top: 30px;
        }
        .btn-convert {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);
        }
        .btn-convert:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-convert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-swap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-swap:hover {
            background: #e2e8f0;
            color: #1a1a2e;
            transform: rotate(180deg);
        }

        .btn-copy {
            padding: 6px 14px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .btn-copy:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }
        .btn-copy.copied {
            background: #10b981;
            color: #fff;
        }

        .options-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: center;
        }
        .options-row .input-group {
            flex: 0 0 auto;
            min-width: 160px;
        }
        .options-row select {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
            background: #fff;
        }
        .options-row select:focus {
            border-color: #f5576c;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        .btn-secondary {
            padding: 10px 24px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }

        @media (max-width: 768px) {
            .convert-row {
                grid-template-columns: 1fr;
            }
            .middle-col {
                flex-direction: row;
                padding-top: 0;
                justify-content: center;
            }
            .btn-convert {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🔄</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">JSON YAML 转换</span>
            </div>
        </div>
    </header>

    <main class="convert-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="data.html" class="back-link">← 返回数据工具</a>

        <div class="convert-box">
            <h2>🔄 JSON / YAML 转换</h2>
            <p class="desc">JSON 与 YAML 格式互转 · 支持自定义缩进</p>

            <div class="direction-toggle">
                <div class="direction-toggle-inner">
                    <button class="direction-btn active" data-dir="json-to-yaml" id="btnJsonToYaml">JSON → YAML</button>
                    <button class="direction-btn" data-dir="yaml-to-json" id="btnYamlToJson">YAML → JSON</button>
                </div>
            </div>

            <div class="options-row">
                <div class="input-group" style="flex-direction: row; align-items: center; gap: 8px;">
                    <label for="indent" style="margin: 0;">缩进:</label>
                    <select id="indent">
                        <option value="2">2 空格</option>
                        <option value="4">4 空格</option>
                        <option value="8">8 空格</option>
                    </select>
                </div>
            </div>

            <div class="convert-row">
                <div class="input-group">
                    <label>
                        <span id="inputLabel">输入 JSON</span>
                        <button class="btn-copy" id="btnClearInput" style="display: none;">🗑️ 清空</button>
                    </label>
                    <textarea id="inputText" placeholder='请输入 JSON 文本，例如：{"name":"test","value":123}'></textarea>
                </div>

                <div class="middle-col">
                    <button class="btn-convert" id="btnConvert" title="转换">➡️</button>
                    <button class="btn-swap" id="btnSwap" title="交换输入输出">⇅</button>
                </div>

                <div class="input-group">
                    <label>
                        <span id="outputLabel">输出 YAML</span>
                        <button class="btn-copy" id="btnCopy" style="display: none;">📋 复制</button>
                    </label>
                    <div class="result-box" id="outputText">
                        <span class="placeholder">等待转换...</span>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-secondary" id="btnSample">📝 加载示例</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const indent = document.getElementById('indent');
        const btnConvert = document.getElementById('btnConvert');
        const btnCopy = document.getElementById('btnCopy');
        const btnSwap = document.getElementById('btnSwap');
        const btnSample = document.getElementById('btnSample');
        const btnClearInput = document.getElementById('btnClearInput');
        const btnJsonToYaml = document.getElementById('btnJsonToYaml');
        const btnYamlToJson = document.getElementById('btnYamlToJson');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');

        let currentDirection = 'json-to-yaml';
        let currentResult = '';

        const sampleJson = {
            "name": "Friendly Tools",
            "version": "1.0.0",
            "description": "一个友好的在线工具集合",
            "features": ["进制转换", "文本处理", "JSON格式化", "图片转换"],
            "author": {
                "name": "Developer",
                "email": "dev@example.com"
            },
            "config": {
                "maxFileSize": 10,
                "enableCache": true,
                "theme": "auto"
            },
            "tags": ["tools", "web", "utility"],
            "stats": {
                "users": 10000,
                "tools": 25,
                "rating": 4.8
            }
        };

        const sampleYaml = `name: Friendly Tools
version: 1.0.0
description: 一个友好的在线工具集合
features:
  - 进制转换
  - 文本处理
  - JSON格式化
  - 图片转换
author:
  name: Developer
  email: dev@example.com
config:
  maxFileSize: 10
  enableCache: true
  theme: auto
tags:
  - tools
  - web
  - utility
stats:
  users: 10000
  tools: 25
  rating: 4.8
`;

        function setDirection(dir) {
            currentDirection = dir;
            if (dir === 'json-to-yaml') {
                btnJsonToYaml.classList.add('active');
                btnYamlToJson.classList.remove('active');
                inputLabel.textContent = '输入 JSON';
                outputLabel.textContent = '输出 YAML';
                inputText.placeholder = '请输入 JSON 文本，例如：{"name":"test","value":123}';
            } else {
                btnYamlToJson.classList.add('active');
                btnJsonToYaml.classList.remove('active');
                inputLabel.textContent = '输入 YAML';
                outputLabel.textContent = '输出 JSON';
                inputText.placeholder = '请输入 YAML 文本，例如：\\nname: test\\nvalue: 123';
            }
            outputText.innerHTML = '<span class="placeholder">等待转换...</span>';
            outputText.classList.remove('error');
            btnCopy.style.display = 'none';
            currentResult = '';
        }

        async function convert() {
            const text = inputText.value;

            if (!text || text.trim() === '') {
                outputText.innerHTML = '<span class="placeholder">请输入要转换的文本</span>';
                outputText.classList.remove('error');
                btnCopy.style.display = 'none';
                return;
            }

            btnConvert.disabled = true;
            outputText.classList.remove('error');
            outputText.innerHTML = '<span style="color: #f5576c;">⏳ 处理中...</span>';

            const endpoint = currentDirection === 'json-to-yaml'
                ? '/api/data/json-to-yaml'
                : '/api/data/yaml-to-json';

            try {
                const indentVal = parseInt(indent.value);
                const result = await apiRequest(endpoint, {
                    method: 'POST',
                    data: { source: text },
                    options: { indent: indentVal }
                });

                if (result.success) {
                    currentResult = result.data.result;
                    outputText.textContent = currentResult;
                    btnCopy.style.display = 'inline-block';
                } else {
                    outputText.innerHTML = `<span style="color:#ef4444;">❌ ${result.error}</span>`;
                    outputText.classList.add('error');
                    btnCopy.style.display = 'none';
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                outputText.innerHTML = '<span style="color:#ef4444;">❌ 无法连接到后端服务</span>';
                outputText.classList.add('error');
                btnCopy.style.display = 'none';
            } finally {
                btnConvert.disabled = false;
            }
        }

        async function copyResult() {
            if (!currentResult) return;
            try {
                await navigator.clipboard.writeText(currentResult);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = currentResult;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            }
        }

        function swapInputOutput() {
            const temp = inputText.value;
            inputText.value = currentResult || '';
            currentResult = temp;
            if (currentResult) {
                outputText.textContent = currentResult;
                btnCopy.style.display = 'inline-block';
            } else {
                outputText.innerHTML = '<span class="placeholder">等待转换...</span>';
                btnCopy.style.display = 'none';
            }
            outputText.classList.remove('error');
            btnClearInput.style.display = inputText.value ? 'inline-block' : 'none';
            currentDirection = currentDirection === 'json-to-yaml' ? 'yaml-to-json' : 'json-to-yaml';
            setDirection(currentDirection);
            if (inputText.value) {
                convert();
            }
        }

        function loadSample() {
            if (currentDirection === 'json-to-yaml') {
                inputText.value = JSON.stringify(sampleJson, null, 2);
            } else {
                inputText.value = sampleYaml;
            }
            btnClearInput.style.display = 'inline-block';
            convert();
        }

        function clearInput() {
            inputText.value = '';
            outputText.innerHTML = '<span class="placeholder">等待转换...</span>';
            outputText.classList.remove('error');
            btnCopy.style.display = 'none';
            btnClearInput.style.display = 'none';
            currentResult = '';
            inputText.focus();
        }

        btnConvert.addEventListener('click', convert);
        btnCopy.addEventListener('click', copyResult);
        btnSwap.addEventListener('click', swapInputOutput);
        btnSample.addEventListener('click', loadSample);
        btnClearInput.addEventListener('click', clearInput);

        btnJsonToYaml.addEventListener('click', () => {
            setDirection('json-to-yaml');
        });
        btnYamlToJson.addEventListener('click', () => {
            setDirection('yaml-to-json');
        });

        indent.addEventListener('change', () => {
            if (inputText.value.trim()) {
                convert();
            }
        });

        inputText.addEventListener('input', () => {
            btnClearInput.style.display = inputText.value ? 'inline-block' : 'none';
        });

        loadSample();

        console.log('🔄 JSON YAML 转换已加载！');
    </script>
</body>
</html>
