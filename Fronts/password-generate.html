<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎲 随机密码生成 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .tool-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .tool-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .tool-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .tool-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-group input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e2e8f0;
            outline: none;
            -webkit-appearance: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.3);
        }
        .slider-value {
            min-width: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            color: #f5576c;
            font-family: 'Courier New', monospace;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .checkbox-item:hover {
            border-color: #f5576c;
        }
        .checkbox-item input {
            display: none;
        }
        .checkbox-item input:checked + .checkbox-custom {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-color: #f5576c;
        }
        .checkbox-item input:checked + .checkbox-custom::after {
            opacity: 1;
        }
        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            position: relative;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .checkbox-custom::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .checkbox-label {
            font-size: 14px;
            color: #1a1a2e;
        }

        .count-input {
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .count-input:focus {
            border-color: #f5576c;
        }

        .btn-generate {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 4px;
        }
        .btn-generate:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }
        .result-section h4 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
        }
        .password-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .password-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .password-text {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            color: #1a1a2e;
            word-break: break-all;
            user-select: all;
        }
        .btn-copy {
            padding: 6px 14px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .btn-copy:hover {
            border-color: #f5576c;
            color: #f5576c;
        }
        .btn-copy.copied {
            background: #d1fae5;
            border-color: #10b981;
            color: #059669;
        }

        .placeholder-text {
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }

        .loading-text {
            color: #f5576c;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }

        @media (max-width: 640px) {
            .checkbox-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🎲</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">随机密码生成</span>
            </div>
        </div>
    </header>

    <main class="tool-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="tool-box">
            <h2>🎲 随机密码生成器</h2>
            <p class="desc">自定义字符类型，生成安全可靠的随机密码</p>

            <div class="input-group">
                <label>密码长度</label>
                <div class="slider-group">
                    <input type="range" id="lengthSlider" min="4" max="64" value="16" />
                    <span class="slider-value" id="lengthValue">16</span>
                </div>
            </div>

            <div class="input-group">
                <label>字符类型</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="includeLowercase" checked />
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">小写字母 (a-z)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="includeUppercase" checked />
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">大写字母 (A-Z)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="includeNumbers" checked />
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">数字 (0-9)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="includeSymbols" checked />
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">特殊符号 (!@#$...)</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="countInput">生成数量</label>
                <input type="number" id="countInput" class="count-input" value="1" min="1" max="20" />
            </div>

            <button class="btn-generate" id="btnGenerate">🔑 生成密码</button>

            <div class="result-section">
                <h4>📋 生成结果</h4>
                <div id="resultBox">
                    <p class="placeholder-text">点击上方按钮生成密码</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const includeLowercase = document.getElementById('includeLowercase');
        const includeUppercase = document.getElementById('includeUppercase');
        const includeNumbers = document.getElementById('includeNumbers');
        const includeSymbols = document.getElementById('includeSymbols');
        const countInput = document.getElementById('countInput');
        const btnGenerate = document.getElementById('btnGenerate');
        const resultBox = document.getElementById('resultBox');

        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function validateOptions() {
            if (!includeLowercase.checked && !includeUppercase.checked &&
                !includeNumbers.checked && !includeSymbols.checked) {
                return '请至少选择一种字符类型';
            }
            const count = parseInt(countInput.value);
            if (isNaN(count) || count < 1 || count > 20) {
                return '生成数量需在 1-20 之间';
            }
            return null;
        }

        async function generatePasswords() {
            const error = validateOptions();
            if (error) {
                resultBox.innerHTML = `<p style="color:#ef4444;text-align:center;padding:20px 0;font-size:13px;">❌ ${error}</p>`;
                return;
            }

            btnGenerate.disabled = true;
            resultBox.innerHTML = '<p class="loading-text">⏳ 生成中...</p>';

            const options = {
                length: parseInt(lengthSlider.value),
                includeLowercase: includeLowercase.checked,
                includeUppercase: includeUppercase.checked,
                includeNumbers: includeNumbers.checked,
                includeSymbols: includeSymbols.checked,
                count: parseInt(countInput.value)
            };

            try {
                const result = await apiRequest('/api/security/password-generate', {
                    method: 'POST',
                    options: options
                });

                if (result.success) {
                    const passwords = result.data.passwords;
                    const list = document.createElement('div');
                    list.className = 'password-list';

                    passwords.forEach((password, index) => {
                        const item = document.createElement('div');
                        item.className = 'password-item';
                        item.innerHTML = `
                            <span class="password-text">${password}</span>
                            <button class="btn-copy" data-password="${password}">📋 复制</button>
                        `;
                        list.appendChild(item);
                    });

                    resultBox.innerHTML = '';
                    resultBox.appendChild(list);

                    resultBox.querySelectorAll('.btn-copy').forEach(btn => {
                        btn.addEventListener('click', () => {
                            copyToClipboard(btn.dataset.password, btn);
                        });
                    });
                } else {
                    resultBox.innerHTML = `<p style="color:#ef4444;text-align:center;padding:20px 0;font-size:13px;">❌ ${result.error}</p>`;
                }
            } catch (err) {
                console.error('请求后端失败:', err);
                resultBox.innerHTML = '<p style="color:#ef4444;text-align:center;padding:20px 0;font-size:13px;">❌ 无法连接到后端服务</p>';
            } finally {
                btnGenerate.disabled = false;
            }
        }

        btnGenerate.addEventListener('click', generatePasswords);

        console.log('🎲 随机密码生成器已加载！');
    </script>
</body>
</html>
