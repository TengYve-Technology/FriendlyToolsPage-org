<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📋 JSON格式化 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .convert-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .convert-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .convert-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .convert-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input-group textarea,
        .input-group select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
        }
        .input-group textarea:focus,
        .input-group select:focus {
            border-color: #f5576c;
        }
        .input-group textarea {
            min-height: 220px;
            line-height: 1.5;
        }

        .convert-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .result-box {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            min-height: 220px;
            border: 2px dashed #e2e8f0;
            color: #1a1a2e;
            word-break: break-all;
            white-space: pre-wrap;
            overflow-y: auto;
            line-height: 1.5;
        }
        .result-box .placeholder {
            color: #94a3b8;
            font-size: 14px;
        }
        .result-box.error {
            border-color: #fecaca;
            background: #fef2f2;
        }

        .btn-convert {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            width: 100%;
        }
        .btn-convert:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-convert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-copy {
            padding: 6px 14px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .btn-copy:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }
        .btn-copy.copied {
            background: #10b981;
            color: #fff;
        }

        .options-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .options-row .input-group {
            flex: 1;
            margin-bottom: 0;
            min-width: 160px;
        }

        .mode-toggle {
            display: flex;
        }
        .mode-toggle-inner {
            display: inline-flex;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 4px;
            width: 100%;
        }
        .mode-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #64748b;
            white-space: nowrap;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.3);
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        .btn-secondary {
            padding: 12px 24px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }

        @media (max-width: 640px) {
            .convert-row {
                grid-template-columns: 1fr;
            }
            .options-row {
                flex-direction: column;
            }
            .btn-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">📋</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">JSON格式化</span>
            </div>
        </div>
    </header>

    <main class="convert-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="convert.html" class="back-link">← 返回转换工具</a>

        <div class="convert-box">
            <h2>📋 JSON 格式化</h2>
            <p class="desc">格式化美化 · 压缩 · 自定义缩进</p>

            <div class="options-row">
                <div class="input-group">
                    <label for="indent">缩进方式</label>
                    <select id="indent">
                        <option value="2">2 个空格</option>
                        <option value="4" selected>4 个空格</option>
                        <option value="tab">Tab 制表符</option>
                        <option value="0">压缩（无缩进）</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>模式</label>
                    <div class="mode-toggle">
                        <div class="mode-toggle-inner">
                            <button class="mode-btn active" data-mode="format" id="btnFormat">格式化</button>
                            <button class="mode-btn" data-mode="minify" id="btnMinify">压缩</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="convert-row">
                <div class="input-group">
                    <label>
                        <span>输入 JSON</span>
                        <button class="btn-copy" id="btnClearInput" style="display: none;">🗑️ 清空</button>
                    </label>
                    <textarea id="inputText" placeholder='请输入 JSON 文本，例如：{"name":"test","value":123}'></textarea>
                </div>
                <div class="input-group">
                    <label>
                        <span>输出结果</span>
                        <button class="btn-copy" id="btnCopy" style="display: none;">📋 复制</button>
                    </label>
                    <div class="result-box" id="outputText">
                        <span class="placeholder">等待格式化...</span>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn-secondary" id="btnSample">📝 示例 JSON</button>
                <button class="btn-convert" id="btnConvert">✨ 格式化 / 压缩</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const indent = document.getElementById('indent');
        const btnConvert = document.getElementById('btnConvert');
        const btnCopy = document.getElementById('btnCopy');
        const btnFormat = document.getElementById('btnFormat');
        const btnMinify = document.getElementById('btnMinify');
        const btnSample = document.getElementById('btnSample');
        const btnClearInput = document.getElementById('btnClearInput');

        let currentMode = 'format';
        let currentResult = '';

        const sampleJson = {
            "name": "Friendly Tools",
            "version": "1.0.0",
            "description": "一个友好的在线工具集合",
            "features": ["进制转换", "文本处理", "JSON格式化", "图片转换"],
            "author": {
                "name": "Developer",
                "email": "dev@example.com"
            },
            "config": {
                "maxFileSize": 10,
                "enableCache": true,
                "theme": "auto"
            },
            "tags": ["tools", "web", "utility"],
            "stats": {
                "users": 10000,
                "tools": 25,
                "rating": 4.8
            }
        };

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'format') {
                btnFormat.classList.add('active');
                btnMinify.classList.remove('active');
                indent.disabled = false;
            } else {
                btnMinify.classList.add('active');
                btnFormat.classList.remove('active');
                indent.disabled = true;
            }
        }

        function getIndentValue() {
            if (currentMode === 'minify') {
                return 0;
            }
            const val = indent.value;
            if (val === 'tab') return '\t';
            return parseInt(val);
        }

        async function formatJson() {
            const text = inputText.value.trim();

            if (!text) {
                outputText.innerHTML = '<span class="placeholder">请输入 JSON 文本</span>';
                outputText.classList.remove('error');
                btnCopy.style.display = 'none';
                return;
            }

            btnConvert.disabled = true;
            outputText.classList.remove('error');
            outputText.innerHTML = '<span style="color: #f5576c;">⏳ 处理中...</span>';

            try {
                const indentVal = getIndentValue();
                const result = await apiRequest('/api/convert/json-format', {
                    method: 'POST',
                    data: { text },
                    options: { indent: indentVal }
                });

                if (result.success) {
                    currentResult = result.data.result;
                    outputText.textContent = currentResult;
                    btnCopy.style.display = 'inline-block';
                } else {
                    outputText.innerHTML = `<span style="color:#ef4444;">❌ ${result.error}</span>`;
                    outputText.classList.add('error');
                    btnCopy.style.display = 'none';
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                outputText.innerHTML = '<span style="color:#ef4444;">❌ 无法连接到后端服务</span>';
                outputText.classList.add('error');
                btnCopy.style.display = 'none';
            } finally {
                btnConvert.disabled = false;
            }
        }

        async function copyResult() {
            if (!currentResult) return;
            try {
                await navigator.clipboard.writeText(currentResult);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = currentResult;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btnCopy.textContent = '✅ 已复制';
                btnCopy.classList.add('copied');
                setTimeout(() => {
                    btnCopy.textContent = '📋 复制';
                    btnCopy.classList.remove('copied');
                }, 2000);
            }
        }

        function loadSample() {
            inputText.value = JSON.stringify(sampleJson);
            btnClearInput.style.display = 'inline-block';
            formatJson();
        }

        function clearInput() {
            inputText.value = '';
            outputText.innerHTML = '<span class="placeholder">等待格式化...</span>';
            outputText.classList.remove('error');
            btnCopy.style.display = 'none';
            btnClearInput.style.display = 'none';
            currentResult = '';
            inputText.focus();
        }

        btnConvert.addEventListener('click', formatJson);
        btnCopy.addEventListener('click', copyResult);
        btnFormat.addEventListener('click', () => { setMode('format'); formatJson(); });
        btnMinify.addEventListener('click', () => { setMode('minify'); formatJson(); });
        indent.addEventListener('change', formatJson);
        btnSample.addEventListener('click', loadSample);
        btnClearInput.addEventListener('click', clearInput);

        inputText.addEventListener('input', () => {
            btnClearInput.style.display = inputText.value ? 'inline-block' : 'none';
        });

        loadSample();

        console.log('📋 JSON 格式化已加载！');
    </script>
</body>
</html>
