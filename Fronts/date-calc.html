<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📅 日期计算器 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: #ec4899;
        }

        .page-header .subtitle {
            color: #64748b;
            font-size: 15px;
            margin-top: 4px;
        }

        .tool-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .mode-btn:hover {
            border-color: #ec4899;
        }

        .mode-btn.active {
            border-color: #ec4899;
            background: #fdf2f8;
        }

        .mode-btn .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .mode-btn .title {
            font-weight: 600;
            color: #374151;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="date"],
        input[type="number"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #ec4899;
        }

        select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: #ec4899;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.4);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .result-section {
            background: #fdf2f8;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-section h3 {
            margin: 0 0 16px 0;
            font-size: 16px;
            color: #db2777;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .result-item {
            background: white;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .result-item .value {
            font-size: 28px;
            font-weight: 700;
            color: #ec4899;
            margin-bottom: 4px;
        }

        .result-item .label {
            font-size: 13px;
            color: #64748b;
        }

        .info-box {
            background: #fdf2f8;
            border: 1px solid #fbcfe8;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .info-box h4 {
            margin: 0 0 8px 0;
            color: #db2777;
            font-size: 14px;
        }

        .info-box p {
            margin: 0;
            font-size: 13px;
            color: #64748b;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">📅</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">日期计算器</span>
            </div>
        </div>
    </header>

    <!-- ===== 主内容 ===== -->
    <main class="main-content">
        <div class="container">
            <a href="convert.html" class="back-home">← 返回转换工具</a>

            <div class="page-header">
                <h1>📅 日期计算器</h1>
                <p class="subtitle">计算日期间隔、工作日、日期加减</p>
            </div>

            <div class="info-box">
                <h4>💡 功能说明</h4>
                <p>
                    <strong>日期差</strong>：计算两个日期之间的间隔<br>
                    <strong>日期加减</strong>：计算某日期加减指定天数后的结果<br>
                    <strong>工作日计算</strong>：计算两个日期之间的工作日天数（排除周末）
                </p>
            </div>

            <div class="tool-container">
                <div class="mode-selector">
                    <div class="mode-btn active" data-mode="diff">
                        <div class="icon">📊</div>
                        <div class="title">日期差</div>
                    </div>
                    <div class="mode-btn" data-mode="add">
                        <div class="icon">➕</div>
                        <div class="title">日期加减</div>
                    </div>
                    <div class="mode-btn" data-mode="workday">
                        <div class="icon">💼</div>
                        <div class="title">工作日</div>
                    </div>
                </div>

                <!-- 日期差模式 -->
                <div id="diffMode">
                    <div class="input-group">
                        <label>选择两个日期</label>
                        <div class="input-row">
                            <input type="date" id="date1" />
                            <span style="color: #64748b;">至</span>
                            <input type="date" id="date2" />
                        </div>
                    </div>
                </div>

                <!-- 日期加减模式 -->
                <div id="addMode" class="hidden">
                    <div class="input-group">
                        <label>起始日期</label>
                        <input type="date" id="addDate" />
                    </div>
                    <div class="input-group">
                        <label>加减数量</label>
                        <div class="input-row">
                            <input type="number" id="addCount" value="1" min="-3650" max="3650" />
                            <select id="addUnit">
                                <option value="day">天</option>
                                <option value="week">周</option>
                                <option value="month">月</option>
                                <option value="year">年</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 工作日模式 -->
                <div id="workdayMode" class="hidden">
                    <div class="input-group">
                        <label>选择两个日期</label>
                        <div class="input-row">
                            <input type="date" id="workday1" />
                            <span style="color: #64748b;">至</span>
                            <input type="date" id="workday2" />
                        </div>
                    </div>
                </div>

                <div class="btn-group" style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="btn btn-primary" id="calculateBtn">🧮 计算</button>
                    <button class="btn btn-secondary" id="todayBtn">📅 今天</button>
                </div>

                <div class="result-section" id="resultSection" style="display: none;">
                    <h3>📊 计算结果</h3>
                    <div class="result-grid" id="resultGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- ===== 页脚 ===== -->
    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script>
        let currentMode = 'diff';

        // 模式切换
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;

                document.getElementById('diffMode').classList.toggle('hidden', currentMode !== 'diff');
                document.getElementById('addMode').classList.toggle('hidden', currentMode !== 'add');
                document.getElementById('workdayMode').classList.toggle('hidden', currentMode !== 'workday');
                document.getElementById('resultSection').style.display = 'none';
            });
        });

        // 今天按钮
        document.getElementById('todayBtn').addEventListener('click', () => {
            const today = new Date().toISOString().split('T')[0];
            if (currentMode === 'diff') {
                document.getElementById('date1').value = today;
                document.getElementById('date2').value = today;
            } else if (currentMode === 'add') {
                document.getElementById('addDate').value = today;
            } else if (currentMode === 'workday') {
                document.getElementById('workday1').value = today;
                document.getElementById('workday2').value = today;
            }
        });

        // 计算按钮
        document.getElementById('calculateBtn').addEventListener('click', async () => {
            const resultSection = document.getElementById('resultSection');
            const resultGrid = document.getElementById('resultGrid');

            try {
                let requestData = {
                    options: { mode: currentMode }
                };

                if (currentMode === 'diff') {
                    const date1 = document.getElementById('date1').value;
                    const date2 = document.getElementById('date2').value;
                    if (!date1 || !date2) {
                        alert('请选择两个日期');
                        return;
                    }
                    requestData.data = { date1, date2 };
                } else if (currentMode === 'add') {
                    const date = document.getElementById('addDate').value;
                    const count = document.getElementById('addCount').value;
                    const unit = document.getElementById('addUnit').value;
                    if (!date) {
                        alert('请选择起始日期');
                        return;
                    }
                    requestData.data = { date1: date };
                    requestData.options = { mode: 'add', count: parseInt(count), unit };
                } else if (currentMode === 'workday') {
                    const date1 = document.getElementById('workday1').value;
                    const date2 = document.getElementById('workday2').value;
                    if (!date1 || !date2) {
                        alert('请选择两个日期');
                        return;
                    }
                    requestData.data = { date1, date2 };
                }

                const response = await fetch('/api/convert/date-calc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (result.success) {
                    resultSection.style.display = 'block';
                    resultGrid.innerHTML = '';

                    const data = result.data;

                    if (currentMode === 'diff') {
                        resultGrid.innerHTML = `
                            <div class="result-item">
                                <div class="value">${data.years}</div>
                                <div class="label">年</div>
                            </div>
                            <div class="result-item">
                                <div class="value">${data.months}</div>
                                <div class="label">月（约）</div>
                            </div>
                            <div class="result-item">
                                <div class="value">${data.weeks}</div>
                                <div class="label">周</div>
                            </div>
                            <div class="result-item">
                                <div class="value">${data.days}</div>
                                <div class="label">天</div>
                            </div>
                            <div class="result-item">
                                <div class="value">${data.hours}</div>
                                <div class="label">小时</div>
                            </div>
                            <div class="result-item">
                                <div class="value">${data.minutes}</div>
                                <div class="label">分钟</div>
                            </div>
                        `;
                    } else if (currentMode === 'add') {
                        resultGrid.innerHTML = `
                            <div class="result-item" style="grid-column: 1 / -1;">
                                <div class="value" style="font-size: 36px;">${data.result}</div>
                                <div class="label">计算结果</div>
                            </div>
                        `;
                    } else if (currentMode === 'workday') {
                        resultGrid.innerHTML = `
                            <div class="result-item">
                                <div class="value">${data.workdays}</div>
                                <div class="label">工作日</div>
                            </div>
                            <div class="result-item">
                                <div class="value">${data.totalDays}</div>
                                <div class="label">总天数</div>
                            </div>
                        `;
                    }
                } else {
                    alert('计算失败: ' + (result.error || '未知错误'));
                }
            } catch (error) {
                alert('网络错误: ' + error.message);
            }
        });

        // 初始化日期
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date1').value = today;
        document.getElementById('date2').value = today;
        document.getElementById('addDate').value = today;
        document.getElementById('workday1').value = today;
        document.getElementById('workday2').value = today;
    </script>
</body>
</html>
