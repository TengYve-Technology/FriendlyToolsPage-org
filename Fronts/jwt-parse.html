<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎫 JWT解析 · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .tool-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .tool-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .tool-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .tool-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .input-group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            min-height: 140px;
            line-height: 1.6;
        }
        .input-group textarea:focus {
            border-color: #f5576c;
        }

        .btn-parse {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 4px;
        }
        .btn-parse:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-parse:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #f1f5f9;
        }
        .result-section h4 {
            font-size: 15px;
            color: #1a1a2e;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-section h4 .section-icon {
            font-size: 18px;
        }

        .result-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .result-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .result-card-title {
            font-weight: 600;
            font-size: 14px;
            color: #475569;
        }

        .result-code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #1a1a2e;
            word-break: break-all;
            line-height: 1.7;
            white-space: pre-wrap;
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-code.placeholder {
            color: #94a3b8;
            font-style: normal;
            white-space: normal;
        }

        .btn-copy {
            padding: 6px 14px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #64748b;
        }
        .btn-copy:hover {
            border-color: #f5576c;
            color: #f5576c;
        }
        .btn-copy.copied {
            background: #d1fae5;
            border-color: #10b981;
            color: #059669;
        }

        .expiry-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .expiry-status.valid {
            background: #d1fae5;
            color: #059669;
        }
        .expiry-status.expired {
            background: #fee2e2;
            color: #dc2626;
        }

        .payload-info {
            margin-bottom: 12px;
            padding: 10px 14px;
            background: #fff;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            color: #475569;
        }
        .payload-info-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }
        .payload-info-item .label {
            color: #94a3b8;
        }
        .payload-info-item .value {
            font-weight: 500;
            color: #1a1a2e;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .loading-text {
            color: #f5576c;
            font-size: 13px;
            text-align: center;
            padding: 16px 0;
        }

        .error-text {
            color: #dc2626;
            font-size: 13px;
            text-align: center;
            padding: 16px 0;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🎫</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">JWT解析</span>
            </div>
        </div>
    </header>

    <main class="tool-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="tool-box">
            <h2>🎫 JWT Token 解析</h2>
            <p class="desc">解析 JWT Token 的 Header、Payload，显示过期时间等信息（仅格式解析，不验证签名）</p>

            <div class="input-group">
                <label for="tokenInput">JWT Token</label>
                <textarea id="tokenInput" placeholder="请输入 JWT Token（格式：Header.Payload.Signature）..."></textarea>
            </div>

            <button class="btn-parse" id="btnParse">🔍 解析 Token</button>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="result-card">
                    <div class="result-card-header">
                        <h4><span class="section-icon">📋</span> Header</h4>
                        <button class="btn-copy" id="btnCopyHeader">📋 复制</button>
                    </div>
                    <div class="result-code placeholder" id="headerCode">等待解析...</div>
                </div>

                <div class="result-card">
                    <div class="result-card-header">
                        <h4>
                            <span class="section-icon">📦</span> Payload
                            <span class="expiry-status" id="expiryStatus" style="display: none;"></span>
                        </h4>
                        <button class="btn-copy" id="btnCopyPayload">📋 复制</button>
                    </div>
                    <div class="payload-info" id="payloadInfo" style="display: none;">
                        <div class="payload-info-item" id="expiresAtItem" style="display: none;">
                            <span class="label">过期时间</span>
                            <span class="value" id="expiresAtValue"></span>
                        </div>
                        <div class="payload-info-item" id="issuedAtItem" style="display: none;">
                            <span class="label">签发时间</span>
                            <span class="value" id="issuedAtValue"></span>
                        </div>
                    </div>
                    <div class="result-code placeholder" id="payloadCode">等待解析...</div>
                </div>

                <div class="result-card">
                    <div class="result-card-header">
                        <h4><span class="section-icon">🔐</span> Signature</h4>
                        <button class="btn-copy" id="btnCopySignature">📋 复制</button>
                    </div>
                    <div class="result-code placeholder" id="signatureCode">等待解析...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const tokenInput = document.getElementById('tokenInput');
        const btnParse = document.getElementById('btnParse');
        const resultSection = document.getElementById('resultSection');
        const headerCode = document.getElementById('headerCode');
        const payloadCode = document.getElementById('payloadCode');
        const signatureCode = document.getElementById('signatureCode');
        const btnCopyHeader = document.getElementById('btnCopyHeader');
        const btnCopyPayload = document.getElementById('btnCopyPayload');
        const btnCopySignature = document.getElementById('btnCopySignature');
        const expiryStatus = document.getElementById('expiryStatus');
        const payloadInfo = document.getElementById('payloadInfo');
        const expiresAtItem = document.getElementById('expiresAtItem');
        const issuedAtItem = document.getElementById('issuedAtItem');
        const expiresAtValue = document.getElementById('expiresAtValue');
        const issuedAtValue = document.getElementById('issuedAtValue');

        let currentHeader = '';
        let currentPayload = '';
        let currentSignature = '';

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function formatJson(obj) {
            return JSON.stringify(obj, null, 2);
        }

        async function parseJwt() {
            const token = tokenInput.value.trim();

            if (!token) {
                resultSection.style.display = 'block';
                headerCode.textContent = '请输入 JWT Token';
                headerCode.classList.add('placeholder');
                payloadCode.textContent = '请输入 JWT Token';
                payloadCode.classList.add('placeholder');
                signatureCode.textContent = '请输入 JWT Token';
                signatureCode.classList.add('placeholder');
                expiryStatus.style.display = 'none';
                payloadInfo.style.display = 'none';
                return;
            }

            btnParse.disabled = true;
            resultSection.style.display = 'block';
            headerCode.textContent = '⏳ 解析中...';
            headerCode.classList.add('placeholder');
            payloadCode.textContent = '⏳ 解析中...';
            payloadCode.classList.add('placeholder');
            signatureCode.textContent = '⏳ 解析中...';
            signatureCode.classList.add('placeholder');
            expiryStatus.style.display = 'none';
            payloadInfo.style.display = 'none';

            try {
                const result = await apiRequest('/api/security/jwt-parse', {
                    method: 'POST',
                    data: { token }
                });

                if (result.success) {
                    const data = result.data;
                    
                    currentHeader = formatJson(data.header);
                    currentPayload = formatJson(data.payload);
                    currentSignature = data.signature;

                    headerCode.textContent = currentHeader;
                    headerCode.classList.remove('placeholder');
                    payloadCode.textContent = currentPayload;
                    payloadCode.classList.remove('placeholder');
                    signatureCode.textContent = currentSignature;
                    signatureCode.classList.remove('placeholder');

                    if (data.expiresAt || data.issuedAt) {
                        payloadInfo.style.display = 'block';
                    }
                    if (data.expiresAt) {
                        expiresAtItem.style.display = 'flex';
                        expiresAtValue.textContent = data.expiresAt;
                    } else {
                        expiresAtItem.style.display = 'none';
                    }
                    if (data.issuedAt) {
                        issuedAtItem.style.display = 'flex';
                        issuedAtValue.textContent = data.issuedAt;
                    } else {
                        issuedAtItem.style.display = 'none';
                    }

                    if (data.payload.exp !== undefined) {
                        expiryStatus.style.display = 'inline-block';
                        if (data.isExpired) {
                            expiryStatus.textContent = '❌ 已过期';
                            expiryStatus.className = 'expiry-status expired';
                        } else {
                            expiryStatus.textContent = '✅ 有效';
                            expiryStatus.className = 'expiry-status valid';
                        }
                    } else {
                        expiryStatus.style.display = 'none';
                    }
                } else {
                    headerCode.textContent = '❌ ' + result.error;
                    headerCode.classList.add('placeholder');
                    payloadCode.textContent = '❌ 解析失败';
                    payloadCode.classList.add('placeholder');
                    signatureCode.textContent = '❌ 解析失败';
                    signatureCode.classList.add('placeholder');
                    expiryStatus.style.display = 'none';
                    payloadInfo.style.display = 'none';
                }
            } catch (err) {
                console.error('请求后端失败:', err);
                headerCode.textContent = '❌ 无法连接到后端服务';
                headerCode.classList.add('placeholder');
                payloadCode.textContent = '❌ 无法连接到后端服务';
                payloadCode.classList.add('placeholder');
                signatureCode.textContent = '❌ 无法连接到后端服务';
                signatureCode.classList.add('placeholder');
                expiryStatus.style.display = 'none';
                payloadInfo.style.display = 'none';
            } finally {
                btnParse.disabled = false;
            }
        }

        btnParse.addEventListener('click', parseJwt);

        btnCopyHeader.addEventListener('click', () => {
            if (currentHeader) copyToClipboard(currentHeader, btnCopyHeader);
        });
        btnCopyPayload.addEventListener('click', () => {
            if (currentPayload) copyToClipboard(currentPayload, btnCopyPayload);
        });
        btnCopySignature.addEventListener('click', () => {
            if (currentSignature) copyToClipboard(currentSignature, btnCopySignature);
        });

        tokenInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                parseJwt();
            }
        });

        console.log('🎫 JWT解析工具已加载！');
    </script>
</body>
</html>
