<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📄 CSV转JSON · Friendly Tools</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .convert-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f5576c; }

        .convert-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .convert-box h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .convert-box .desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .options-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 160px;
        }
        .option-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .option-group select {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            background: #fff;
            cursor: pointer;
        }
        .option-group select:focus {
            border-color: #f5576c;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #f5576c;
        }
        .checkbox-group label {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a2e;
            cursor: pointer;
        }

        .textareas-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .textarea-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .textarea-group .textarea-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .textarea-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }
        .copy-btn {
            padding: 4px 12px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #e2e8f0;
            color: #1a1a2e;
        }
        .copy-btn.copied {
            background: #10b981;
            color: #fff;
        }
        .textarea-group textarea {
            width: 100%;
            min-height: 360px;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
            resize: vertical;
            line-height: 1.5;
            box-sizing: border-box;
        }
        .textarea-group textarea:focus {
            border-color: #f5576c;
        }
        .textarea-group textarea:read-only {
            background: #f8fafc;
        }

        .btn-convert {
            padding: 12px 32px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .btn-convert:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-convert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-info {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }
        .result-info .info-item {
            font-size: 13px;
            color: #64748b;
        }
        .result-info .info-item span {
            font-weight: 600;
            color: #1a1a2e;
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            padding: 10px 14px;
            background: #fef2f2;
            border-radius: 8px;
            border: 1px solid #fecaca;
        }

        @media (max-width: 768px) {
            .textareas-row {
                grid-template-columns: 1fr;
            }
            .textarea-group textarea {
                min-height: 240px;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">📄</span>
                <span class="logo-text">Friendly Tools</span>
                <span class="logo-sub">CSV转JSON</span>
            </div>
        </div>
    </header>

    <main class="convert-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <span style="color: #cbd5e1; margin: 0 8px; font-size: 14px;">|</span>
        <a href="convert.html" class="back-link">← 返回转换工具</a>

        <div class="convert-box">
            <h2>📄 CSV 转 JSON</h2>
            <p class="desc">快速将 CSV 数据转换为 JSON 格式，支持自定义分隔符</p>

            <div class="options-bar">
                <div class="option-group">
                    <label for="delimiter">分隔符</label>
                    <select id="delimiter">
                        <option value=",">逗号 ( , )</option>
                        <option value="	">制表符 (Tab)</option>
                        <option value=";">分号 ( ; )</option>
                    </select>
                </div>
                <div class="option-group checkbox-group">
                    <input type="checkbox" id="hasHeader" checked />
                    <label for="hasHeader">首行为表头</label>
                </div>
            </div>

            <div class="textareas-row">
                <div class="textarea-group">
                    <div class="textarea-header">
                        <label for="csvInput">CSV 输入</label>
                        <button class="copy-btn" id="clearInputBtn">清空</button>
                    </div>
                    <textarea id="csvInput" placeholder="在此粘贴 CSV 数据...

示例：
name,age,city
Alice,25,Beijing
Bob,30,Shanghai
Charlie,28,Guangzhou"></textarea>
                </div>
                <div class="textarea-group">
                    <div class="textarea-header">
                        <label for="jsonOutput">JSON 输出</label>
                        <button class="copy-btn" id="copyBtn">📋 复制</button>
                    </div>
                    <textarea id="jsonOutput" readonly placeholder="转换结果将显示在这里..."></textarea>
                </div>
            </div>

            <button class="btn-convert" id="btnConvert">🔄 立即转换</button>

            <div class="result-info" id="resultInfo" style="display: none;">
                <div class="info-item">行数：<span id="rowCount">0</span></div>
                <div class="info-item" id="headerInfo" style="display: none;">表头：<span id="headers">-</span></div>
            </div>

            <div class="error-msg" id="errorMsg" style="display: none;"></div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Friendly Tools · 用 ❤️ 和 🍅 打造</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const csvInput = document.getElementById('csvInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const delimiter = document.getElementById('delimiter');
        const hasHeader = document.getElementById('hasHeader');
        const btnConvert = document.getElementById('btnConvert');
        const copyBtn = document.getElementById('copyBtn');
        const clearInputBtn = document.getElementById('clearInputBtn');
        const resultInfo = document.getElementById('resultInfo');
        const rowCount = document.getElementById('rowCount');
        const headerInfo = document.getElementById('headerInfo');
        const headers = document.getElementById('headers');
        const errorMsg = document.getElementById('errorMsg');

        function showError(msg) {
            errorMsg.textContent = '❌ ' + msg;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        async function convert() {
            const text = csvInput.value.trim();
            const delim = delimiter.value;
            const header = hasHeader.checked;

            hideError();

            if (!text) {
                jsonOutput.value = '';
                resultInfo.style.display = 'none';
                showError('请输入 CSV 内容');
                return;
            }

            btnConvert.disabled = true;
            btnConvert.textContent = '⏳ 转换中...';
            jsonOutput.value = '转换中，请稍候...';
            resultInfo.style.display = 'none';

            try {
                const result = await apiRequest('/api/convert/csv-to-json', {
                    method: 'POST',
                    data: { text: text },
                    options: { delimiter: delim, hasHeader: header }
                });

                if (result.success) {
                    const jsonStr = JSON.stringify(result.data.result, null, 2);
                    jsonOutput.value = jsonStr;
                    rowCount.textContent = result.data.rowCount;
                    resultInfo.style.display = 'flex';
                    if (result.data.hasHeader && result.data.headers) {
                        headerInfo.style.display = 'block';
                        headers.textContent = result.data.headers.join(', ');
                    } else {
                        headerInfo.style.display = 'none';
                    }
                } else {
                    jsonOutput.value = '';
                    showError(result.error || '转换失败');
                }
            } catch (error) {
                console.error('请求后端失败:', error);
                jsonOutput.value = '';
                showError('无法连接到后端服务，请检查后端是否启动');
            } finally {
                btnConvert.disabled = false;
                btnConvert.textContent = '🔄 立即转换';
            }
        }

        async function copyResult() {
            const text = jsonOutput.value;
            if (!text) return;

            try {
                await navigator.clipboard.writeText(text);
                copyBtn.textContent = '✅ 已复制';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '📋 复制';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                jsonOutput.select();
                document.execCommand('copy');
                copyBtn.textContent = '✅ 已复制';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '📋 复制';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }
        }

        function clearInput() {
            csvInput.value = '';
            jsonOutput.value = '';
            resultInfo.style.display = 'none';
            hideError();
            csvInput.focus();
        }

        btnConvert.addEventListener('click', convert);
        copyBtn.addEventListener('click', copyResult);
        clearInputBtn.addEventListener('click', clearInput);

        csvInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                convert();
            }
        });

        csvInput.value = `name,age,city
Alice,25,Beijing
Bob,30,Shanghai
Charlie,28,Guangzhou`;

        console.log('📄 CSV转JSON 工具已加载！');
    </script>
</body>
</html>
