name: 从个人仓库同步（带冲突检测与Issue通知）

on:
  schedule:
    # 每天 UTC 时间 0:00（北京时间早上 8:00）运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # ============================================================
      # Step 1: 配置 Git 用户信息
      # ============================================================
      - name: 配置 Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ============================================================
      # Step 2: 克隆个人仓库（源）
      # ============================================================
      - name: 克隆个人仓库
        run: |
          git clone https://${{ secrets.PERSONAL_TOKEN }}@github.com/YLZ2013git/FriendlyToolsPage.git source

      # ============================================================
      # Step 3: 克隆组织仓库（目标）
      # ============================================================
      - name: 克隆组织仓库
        run: |
          git clone https://${{ secrets.PERSONAL_TOKEN }}@github.com/TengYve-Technology/FriendlyToolsPage-org.git target

      # ============================================================
      # Step 4: 记录同步前的状态
      # ============================================================
      - name: 记录组织仓库当前状态
        id: pre_sync_state
        run: |
          cd target
          echo "target_head=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "target_commit_count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      # ============================================================
      # Step 5: 执行同步（使用 force-with-lease 安全推送）
      # ============================================================
      - name: 执行同步
        id: sync_step
        continue-on-error: true
        run: |
          cd source
          git remote set-url origin https://${{ secrets.PERSONAL_TOKEN }}@github.com/TengYve-Technology/FriendlyToolsPage-org.git
          git push --force-with-lease origin main
          echo "✅ 同步成功"
          echo "sync_success=true" >> $GITHUB_OUTPUT

      # ============================================================
      # Step 6: 如果同步失败，检查是否是因为远程有新提交
      # ============================================================
      - name: 检查同步失败原因
        id: check_failure
        if: steps.sync_step.outcome == 'failure'
        run: |
          cd target
          git fetch origin
          REMOTE_MAIN=$(git rev-parse origin/main)
          PREV_HEAD="${{ steps.pre_sync_state.outputs.target_head }}"
          
          if [ "$REMOTE_MAIN" != "$PREV_HEAD" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "检测到远程有新提交，产生冲突"
            NEW_COMMITS=$(git log --oneline $PREV_HEAD..$REMOTE_MAIN --no-merges 2>/dev/null || echo "")
            if [ -n "$NEW_COMMITS" ]; then
              echo "new_commits<<EOF" >> $GITHUB_OUTPUT
              echo "$NEW_COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "同步失败但不是因为远程有新提交"
          fi

      # ============================================================
      # Step 7: 如果有冲突，创建 Issue 通知
      # ============================================================
      - name: 创建冲突通知 Issue
        if: steps.check_failure.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            const newCommits = `${{ steps.check_failure.outputs.new_commits || '（无法获取具体提交列表，请手动检查）' }}`;
            const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const triggerType = '${{ github.event_name }}' === 'schedule' ? '⏰ 定时任务' : '👆 手动触发';

            const issueBody = `
            ## ⚠️ 同步冲突检测报告

            组织仓库 **FriendlyToolsPage-org** 在本次同步周期内检测到了新的提交，与个人仓库 **FriendlyToolsPage** 的代码产生冲突。

            ---

            ### 📝 新提交记录（自上次同步以来）
            \`\`\`
            ${newCommits}
            \`\`\`

            ---

            ### 🔧 请选择处理方式

            1. **保留这些提交** → 请手动将组织仓库的变更合并到个人仓库中，然后关闭此 Issue
               - 操作步骤：将组织仓库的最新代码 pull 到个人仓库，解决冲突后 push
            2. **丢弃这些提交** → 强制将组织仓库重置为个人仓库的最新状态
               - 操作步骤：在组织仓库执行 \`git reset --hard <个人仓库的commit>\` 并 push

            ---

            ### 📅 检测信息
            - 检测时间：${now}
            - 触发方式：${triggerType}
            - 相关执行：${runUrl}

            ---

            *此 Issue 由 GitHub Actions 自动创建，关闭后将自动恢复同步流程。*
            `;

            const issue = await github.rest.issues.create({
              owner: 'TengYve-Technology',
              repo: 'FriendlyToolsPage-org',
              title: `[自动] ⚠️ 同步冲突 - ${new Date().toISOString().slice(0, 10)}`,
              body: issueBody,
              labels: ['sync-conflict', 'auto-generated', '需要人工处理']
            });

            console.log(`✅ Issue 已创建：${issue.data.html_url}`);

            await github.rest.issues.createComment({
              owner: 'TengYve-Technology',
              repo: 'FriendlyToolsPage-org',
              issue_number: issue.data.number,
              body: `@TengYve-Technology/owners 请查看此冲突报告并处理 🙏\n\n如需重置组织仓库到个人仓库的最新状态，请在确认后关闭此 Issue，下次同步将自动恢复。`
            });

      # ============================================================
      # Step 8: 同步成功，清理旧冲突 Issue
      # ============================================================
      - name: 同步成功 - 清理旧冲突 Issue
        if: steps.sync_step.outputs.sync_success == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            
            const issues = await github.rest.issues.listForRepo({
              owner: 'TengYve-Technology',
              repo: 'FriendlyToolsPage-org',
              labels: 'sync-conflict',
              state: 'open'
            });

            if (issues.data.length > 0) {
              for (const issue of issues.data) {
                await github.rest.issues.createComment({
                  owner: 'TengYve-Technology',
                  repo: 'FriendlyToolsPage-org',
                  issue_number: issue.number,
                  body: `✅ **同步已成功恢复**（${now}）\n\n之前的冲突已解决或已被覆盖，此 Issue 现在可以关闭了。`
                });
                console.log(`💬 已在 Issue #${issue.number} 中添加评论`);
              }
            }

      # ============================================================
      # Step 9: 其他错误处理
      # ============================================================
      - name: 同步失败 - 其他错误警告
        if: steps.sync_step.outcome == 'failure' && steps.check_failure.outputs.has_changes != 'true'
        run: |
          echo "⚠️ 同步失败，但原因不是远程有新提交"
          echo "请检查："
          echo "1. PERSONAL_TOKEN 是否有效"
          echo "2. 网络连接是否正常"
          echo "3. 仓库是否存在"
          exit 1
